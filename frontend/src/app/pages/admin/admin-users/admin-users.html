<section class="admin-page">
  <div class="admin-page-header users-header">
    <div>
      <h1>Usuarios</h1>
      <p>Consulta y gestiona los usuarios registrados en la aplicación.</p>
    </div>

    <button type="button" class="btn">
      + Crear usuario
    </button>
  </div>

  <div class="card table-card">
    <div class="table-actions">
      <div class="form-group">
        <label for="search">Buscar usuario</label>
        <input id="search" type="text" placeholder="Buscar por nombre o email...">
      </div>

      <div class="form-group">
        <label for="role">Filtrar rol</label>
        <select id="role">
          <option>Todos</option>
          <option>USER</option>
          <option>ADMIN</option>
        </select>
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Tableros</th>
            <th>Planes</th>
            <th>Creado</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody>
          @for (user of users; track user.id) {
            <tr>
              <td>#{{ user.id }}</td>
              <td>
                <strong>{{ user.name }}</strong>
              </td>
              <td>{{ user.email }}</td>
              <td>
                <span class="role-pill" [class.admin]="user.role === 'ADMIN'">
                  {{ user.role }}
                </span>
              </td>
              <td>{{ user.boardsCount }}</td>
              <td>{{ user.plansCount }}</td>
              <td>{{ user.createdAt }}</td>
              <td>
                <div class="actions">
                  <button type="button" class="mini-btn">Editar</button>
                  <button type="button" class="mini-btn danger">Eliminar</button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</section>
